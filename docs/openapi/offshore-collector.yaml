openapi: 3.0.3
info:
  title: CryptoPay Offshore Collector API
  version: 1.0.0
servers:
  - url: http://localhost:3002
components:
  parameters:
    IdempotencyKey:
      name: idempotency-key
      in: header
      required: true
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
            details: {}
    CreateTransferRequest:
      type: object
      required:
        [quoteId, senderId, receiverId, senderKycStatus, idempotencyKey]
      properties:
        quoteId: { type: string }
        senderId: { type: string }
        receiverId: { type: string }
        senderKycStatus:
          type: string
          enum: [approved, pending, rejected]
        idempotencyKey:
          type: string
    PaymentVerifyRequest:
      type: object
      required: [transferId, txHash]
      properties:
        transferId:
          type: string
        txHash:
          type: string
    PaymentVerifiedResponse:
      type: object
      required: [verified, transferId, chain, token, txHash, amountUsd, depositAddress, confirmedAt]
      properties:
        verified:
          type: boolean
          enum: [true]
        transferId:
          type: string
        chain:
          type: string
          enum: [base, solana]
        token:
          type: string
          enum: [USDC, USDT]
        txHash:
          type: string
        amountUsd:
          type: number
        depositAddress:
          type: string
        confirmedAt:
          type: string
          format: date-time
        referenceHash:
          type: string
          nullable: true
        payerAddress:
          type: string
          nullable: true
        paymentId:
          type: string
          nullable: true
paths:
  /healthz:
    get:
      responses:
        '200':
          description: OK
  /readyz:
    get:
      responses:
        '200':
          description: Ready
  /v1/transfers:
    post:
      summary: Create transfer (sender KYC gated)
      description: |
        Creates an offshore transfer intent. Sender KYC approval is required.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '201':
          description: Transfer created
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /internal/v1/transfers/create:
    post:
      summary: Internal transfer create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '201':
          description: Transfer created
        '400':
          description: Validation error
  /internal/v1/transfers/solana-payment/verify:
    post:
      summary: Verify Solana wallet payment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentVerifyRequest'
      responses:
        '200':
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentVerifiedResponse'
        '400':
          description: Verification failed
  /internal/v1/transfers/base-payment/verify:
    post:
      summary: Verify Base wallet payment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentVerifyRequest'
      responses:
        '200':
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentVerifiedResponse'
        '400':
          description: Verification failed
