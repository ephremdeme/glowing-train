# Local production simulation overrides.
# Usage:
#   APP_ENV_FILE=.env.prod.local docker compose --env-file .env.prod.local -p cryptopay-prod-sim \
#     -f docker-compose.prod.yml -f docker-compose.prod.sim.yml up -d --build
#
# Notes:
# - Local-only build cache settings live in this file (not in docker-compose.prod.yml).
# - Uses inline cache metadata (compatible with the default `docker` driver).
# - If you switch to a `buildx` docker-container driver later, you can re-enable
#   explicit local cache export/import backends for stronger caching.

x-local-build-args: &local-build-args
  BUILDKIT_INLINE_CACHE: "1"

x-local-node-build: &local-node-build
  context: .
  dockerfile: docker/node.Dockerfile

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptopay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptopay}
      POSTGRES_DB: ${POSTGRES_DB:-cryptopay}
    ports: !override
      - '127.0.0.1:15432:5432'

  redis:
    ports: !override
      - '127.0.0.1:16379:6379'

  core-api:
    image: cryptopay/core-api:prod-sim
    build:
      <<: *local-node-build
      args:
        <<: *local-build-args
        SERVICE_NAME: core-api
        SERVICE_PORT: 3001
      cache_from:
        - cryptopay/core-api:prod-sim
    env_file:
      - .env.prod.local
    ports: !override
      - '127.0.0.1:13001:3001'

  customer-auth:
    image: cryptopay/customer-auth:prod-sim
    build:
      <<: *local-node-build
      args:
        <<: *local-build-args
        SERVICE_NAME: customer-auth
        SERVICE_PORT: 3005
      cache_from:
        - cryptopay/customer-auth:prod-sim
    env_file:
      - .env.prod.local
    ports: !override
      - '127.0.0.1:13005:3005'

  offshore-collector:
    image: cryptopay/offshore-collector:prod-sim
    build:
      <<: *local-node-build
      args:
        <<: *local-build-args
        SERVICE_NAME: offshore-collector
        SERVICE_PORT: 3002
      cache_from:
        - cryptopay/offshore-collector:prod-sim
    env_file:
      - .env.prod.local
    environment:
      BASE_DEPOSIT_FACTORY_ADDRESS: ${BASE_DEPOSIT_FACTORY_ADDRESS}
      BASE_USDC_PROXY_INIT_CODE_HASH: ${BASE_USDC_PROXY_INIT_CODE_HASH}
      BASE_USDT_PROXY_INIT_CODE_HASH: ${BASE_USDT_PROXY_INIT_CODE_HASH}
      BASE_DEPOSIT_PROXY_INIT_CODE_HASH: ${BASE_DEPOSIT_PROXY_INIT_CODE_HASH}
      BASE_TREASURY_ADDRESS: ${BASE_TREASURY_ADDRESS}
    ports: !override
      - '127.0.0.1:13002:3002'

  payout-orchestrator:
    image: cryptopay/payout-orchestrator:prod-sim
    build:
      <<: *local-node-build
      args:
        <<: *local-build-args
        SERVICE_NAME: payout-orchestrator
        SERVICE_PORT: 3003
      cache_from:
        - cryptopay/payout-orchestrator:prod-sim
    env_file:
      - .env.prod.local
    ports: !override
      - '127.0.0.1:13003:3003'

  reconciliation-worker:
    image: cryptopay/reconciliation-worker:prod-sim
    build:
      <<: *local-node-build
      args:
        <<: *local-build-args
        SERVICE_NAME: reconciliation-worker
        SERVICE_PORT: 3004
      cache_from:
        - cryptopay/reconciliation-worker:prod-sim
    env_file:
      - .env.prod.local
    ports: !override
      - '127.0.0.1:13004:3004'

  admin-api:
    image: cryptopay/admin-api:prod-sim
    build:
      <<: *local-node-build
      args:
        <<: *local-build-args
        SERVICE_NAME: admin-api
        SERVICE_PORT: 3010
      cache_from:
        - cryptopay/admin-api:prod-sim
    env_file:
      - .env.prod.local
    ports: !override
      - '127.0.0.1:13010:3010'

  base-watcher:
    image: cryptopay/base-watcher:prod-sim
    build:
      context: .
      dockerfile: workers/base-watcher/Dockerfile
      cache_from:
        - cryptopay/base-watcher:prod-sim
    env_file:
      - .env.prod.local
    environment:
      CORE_API_URL: http://core-api:3001
      CORE_API_FUNDING_CALLBACK_URL: http://core-api:3001/internal/v1/funding-confirmed

  solana-watcher:
    image: cryptopay/solana-watcher:prod-sim
    build:
      context: .
      dockerfile: workers/solana-watcher/Dockerfile
      cache_from:
        - cryptopay/solana-watcher:prod-sim
    env_file:
      - .env.prod.local
    environment:
      CORE_API_URL: http://core-api:3001
      CORE_API_FUNDING_CALLBACK_URL: http://core-api:3001/internal/v1/funding-confirmed

  web:
    image: cryptopay/web:prod-sim
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        <<: *local-build-args
        NEXT_PUBLIC_SOLANA_CLUSTER: ${NEXT_PUBLIC_SOLANA_CLUSTER:-mainnet-beta}
        NEXT_PUBLIC_SOLANA_PROGRAM_ID: ${NEXT_PUBLIC_SOLANA_PROGRAM_ID:-}
        NEXT_PUBLIC_SOLANA_USDT_MINT: ${NEXT_PUBLIC_SOLANA_USDT_MINT:-}
        NEXT_PUBLIC_SOLANA_USDC_MINT: ${NEXT_PUBLIC_SOLANA_USDC_MINT:-}
        NEXT_PUBLIC_SOLANA_USDT_TREASURY_ATA: ${NEXT_PUBLIC_SOLANA_USDT_TREASURY_ATA:-}
        NEXT_PUBLIC_SOLANA_USDC_TREASURY_ATA: ${NEXT_PUBLIC_SOLANA_USDC_TREASURY_ATA:-}
        NEXT_PUBLIC_WALLET_MODE: ${NEXT_PUBLIC_WALLET_MODE:-real}
        NEXT_PUBLIC_LANDING_USDC_ETB_RATE: ${NEXT_PUBLIC_LANDING_USDC_ETB_RATE:-140}
        NEXT_PUBLIC_LANDING_USDT_ETB_RATE: ${NEXT_PUBLIC_LANDING_USDT_ETB_RATE:-140}
        NEXT_PUBLIC_LANDING_FEE_USD: ${NEXT_PUBLIC_LANDING_FEE_USD:-1}
      cache_from:
        - cryptopay/web:prod-sim
    env_file:
      - .env.prod.local
    ports: !override
      - '127.0.0.1:18080:3000'

  prometheus:
    profiles: !override []
    ports: !override
      - '127.0.0.1:19090:9090'
